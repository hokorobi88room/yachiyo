<svg viewBox="0 0 120 110" xmlns="http://www.w3.org/2000/svg" color="#3A3226" fill="currentColor">
  <!-- 鳥居：柱2本＋笠木＋島木＋額束＋貫。端正で親しみやすい万能シルエット。CSSでcolor色替え可 -->
  <g fill="currentColor">
    <!-- 笠木（そりのある上の梁） -->
    <path d="M4 7 Q60 21 116 7 L112 17 Q60 30 8 17 Z"/>
    <!-- 島木（笠木の下の梁） -->
    <path d="M9 18 Q60 31 111 18 L111 26 Q60 38 9 26 Z"/>
    <!-- 額束（中央の束） -->
    <rect x="55" y="32" width="10" height="20"/>
    <!-- 貫（下の横木） -->
    <rect x="24" y="52" width="72" height="9" rx="1.5"/>
    <!-- 左柱 -->
    <path d="M35 26 L45 26 L47 104 L33 104 Z"/>
    <!-- 右柱 -->
    <path d="M75 26 L85 26 L87 104 L73 104 Z"/>
  </g>
</svg>
