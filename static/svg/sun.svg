<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 朝日：放射光線なし。中心（山吹→茜のグラデ）＋やわらかいハロ（同心の淡いにじみ） -->
  <defs>
    <radialGradient id="sun-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F5B841" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#F5B841" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F5B841" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun-core" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#F8CB63"/>
      <stop offset="55%" stop-color="#F5B841"/>
      <stop offset="100%" stop-color="#E8674A"/>
    </radialGradient>
  </defs>
  <!-- ハロ（光暈） -->
  <circle cx="100" cy="100" r="98" fill="url(#sun-halo)"/>
  <circle cx="100" cy="100" r="66" fill="#F5B841" fill-opacity="0.12"/>
  <!-- 朝日の玉 -->
  <circle cx="100" cy="100" r="46" fill="url(#sun-core)"/>
</svg>
